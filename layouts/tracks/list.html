{{ define "content" }}
<div class="tracks-archive" style="max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: system-ui, -apple-system, sans-serif;">
  
  <header >
    <h1 style="font-size: 4rem; color: #ffffff; margin-bottom: 10px;">My daily tracks</h1>
    <p style="color: #ffffff; font-size: 2rem;">every road you take</p>
  </header>


  <div class="months-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
    {{ range .Pages.ByPublishDate.Reverse }}
    <a href="{{ .Permalink }}" class="month-card" style="text-decoration: none; color: inherit;">
      <div style="background: white; border: 1px solid #dfe6e9; border-radius: 12px; padding: 20px; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.05);" 
           onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 10px 20px rgba(0,0,0,0.1)'" 
           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 5px rgba(0,0,0,0.05)'">
        
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <h3 style="margin: 0; font-size: 1.25rem; color: #2d3436;">
            {{ .Title }}
          </h3>
          <span style="background: #e1f5fe; color: #01579b; padding: 4px 12px; border-radius: 20px; font-size: 1.5rem; font-weight: bold;">
            view the map
          </span>
        </div>
        
        <p style="margin-top: 10px; color: #000000; font-size: 1.1rem;">
          📅 date {{ .Date.Format "2026-04-01" }}
        </p>
      </div>
    </a>
    {{ end }}
  </div>

  {{ if eq (len .Pages) 0 }}
  <div style="text-align: center; padding: 100px 0; color: #b2bec3;">
    <p>Nothing has been recorded. Go out and take on a trip!</p>
  </div>
  {{ end }}
</div>
{{ end }}
